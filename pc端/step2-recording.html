<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:,">
  <title>语音转文字 - 录音中</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      overflow: hidden;
    }

    .viewport {
      width: 1280px;
      height: 720px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      transform-origin: center center;
      transform: scale(min(calc(100vw / 1280), calc(100vh / 720)));
    }

    .stage {
      position: relative;
      width: 1280px;
      height: 720px;
      background: #ffffff;
      overflow: hidden;
    }

    .bg,
    .phone-shell,
    .phone-panel,
    .wave,
    .loading-icon {
      position: absolute;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .bg {
      inset: 0;
      width: 1280px;
      height: 720px;
      object-fit: cover;
    }

    .phone-shell {
      left: 473px;
      top: 64px;
      width: 335px;
      height: 592px;
      object-fit: cover;
    }

    .phone-panel {
      left: 508px;
      top: 90px;
      width: 264px;
      height: 536px;
    }

    .title {
      position: absolute;
      left: 604px;
      top: 119px;
      width: 72px;
      height: 24px;
      color: #1f2937;
      font-size: 18px;
      font-weight: 600;
      line-height: 24px;
      text-align: center;
      white-space: nowrap;
    }

    .visual {
      position: absolute;
      left: 560px;
      top: 175px;
      width: 160px;
      height: 160px;
      animation: floatMic 2.4s ease-in-out infinite;
    }

    .visual-shadow {
      position: absolute;
      left: 21.82px;
      top: 122.18px;
      width: 116.36px;
      height: 29.09px;
      background: radial-gradient(ellipse at center, rgba(70, 145, 250, 0.1) 0%, rgba(70, 145, 250, 0) 50%);
    }

    .mic-button {
      position: absolute;
      left: 36px;
      top: 36px;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #3a96ff 0%, #6366f1 100%);
      box-shadow: 0 10.18px 23.27px rgba(56, 189, 248, 0.12);
    }

    .mic-icon {
      width: 48px;
      height: 48px;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .progress-overlay {
      position: absolute;
      left: 24px;
      top: 24px;
      width: 112px;
      height: 112px;
      pointer-events: none;
      transform: rotate(-90deg);
    }

    .progress-overlay circle {
      fill: none;
      stroke: #89a5ff;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .progress-track {
      opacity: 0.3;
    }

    .progress-value {
      stroke-dasharray: 320.44;
      stroke-dashoffset: 320.44;
      transition: stroke-dashoffset 120ms linear;
    }

    .status-pill {
      position: absolute;
      left: 587px;
      top: 335px;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 6px 14px;
      border-radius: 9999px;
      background: rgba(56, 189, 248, 0.12);
      color: #0284c7;
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 4px;
      background: #38bdf8;
      opacity: 0.98;
      flex: 0 0 auto;
      animation: pulseDot 1.2s ease-in-out infinite;
    }

    .timer {
      position: absolute;
      left: 584px;
      top: 384px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 34px;
      line-height: 34px;
      white-space: nowrap;
    }

    .timer-current {
      color: #1f2937;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .timer-total {
      color: #6b7280;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
    }

    .wave {
      left: 524px;
      top: 430px;
      width: 232px;
      height: 67px;
      object-fit: contain;
      object-position: center;
      background: transparent;
    }

    .finish {
      position: absolute;
      left: 560px;
      top: 562px;
      width: 160px;
      height: 48px;
      border: 0;
      border-radius: 9999px;
      background: #2694ff;
      box-shadow: 0 4px 6px rgba(38, 148, 255, 0.3);
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .finish:hover:not(:disabled) {
      background: #1688f7;
      box-shadow: 0 8px 14px rgba(38, 148, 255, 0.35);
      transform: translateY(-1px);
    }

    .finish:active:not(:disabled) {
      background: #0f7ee8;
      box-shadow: 0 2px 5px rgba(38, 148, 255, 0.28);
      transform: translateY(1px) scale(0.98);
    }

    .finish:disabled {
      cursor: default;
    }

    .finish-label,
    .loading-icon {
      grid-area: 1 / 1;
    }

    .loading-icon {
      width: 24px;
      height: 24px;
      display: none;
    }

    .finish.is-loading .finish-label {
      display: none;
    }

    .finish.is-loading .loading-icon {
      display: block;
      animation: spinLoading 0.8s linear infinite;
    }

    @keyframes floatMic {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes pulseDot {
      0%,
      100% {
        opacity: 0.35;
        transform: scale(0.82);
      }

      50% {
        opacity: 1;
        transform: scale(1.18);
      }
    }

    @keyframes spinLoading {
      to {
        transform: rotate(360deg);
      }
    }

  </style>
</head>
<body>
  <main class="viewport" aria-label="语音转文字录音中设计稿还原">
    <section class="stage">
      <img class="bg" src="./images/step2-bg.png" alt="">
      <img class="phone-shell" src="./images/step2-phone.png" alt="">
      <img class="phone-panel" src="./images/step2-panel.svg" alt="">

      <div class="title">语音录音</div>

      <div class="visual" aria-hidden="true">
        <div class="visual-shadow"></div>
        <div class="mic-button">
          <img class="mic-icon" src="./images/mic-icon.svg" alt="">
        </div>
        <svg class="progress-overlay" viewBox="0 0 112 112">
          <circle class="progress-track" cx="56" cy="56" r="51"></circle>
          <circle class="progress-value" id="progressValue" cx="56" cy="56" r="51"></circle>
        </svg>
      </div>

      <div class="status-pill">
        <span class="status-dot"></span>
        <span>正在聆听…</span>
      </div>

      <div class="timer">
        <span class="timer-current" id="timerCurrent">00:00</span>
        <span class="timer-total">/ 00:10</span>
      </div>

      <video class="wave" src="./images/waveform.mp4" autoplay muted loop playsinline aria-hidden="true"></video>

      <button class="finish" type="button" id="finishBtn">
        <span class="finish-label">完成</span>
        <img class="loading-icon" src="./images/loading-spinner.svg" alt="">
      </button>
    </section>
  </main>
  <script>
    var startedAt = Date.now();
    var maxSeconds = 10;
    var timerCurrent = document.getElementById("timerCurrent");
    var progressValue = document.getElementById("progressValue");
    var finishBtn = document.getElementById("finishBtn");
    var circumference = 320.44;
    var finished = false;
    var loading = false;
    var timerHandle;
    var resultToastFlag = "voiceResultToast";

    function formatSeconds(value) {
      return "00:" + String(Math.min(maxSeconds, Math.max(0, value))).padStart(2, "0");
    }

    function setResultToastFlag(shouldShow) {
      try {
        if (shouldShow) {
          sessionStorage.setItem(resultToastFlag, "manual-finish");
        } else {
          sessionStorage.removeItem(resultToastFlag);
        }
      } catch (error) {
        // Ignore storage failures in restricted browser contexts.
      }
    }

    function completeRecording(shouldShowToast) {
      if (finished || loading) return;
      setResultToastFlag(shouldShowToast);
      loading = true;
      finishBtn.classList.add("is-loading");
      finishBtn.disabled = true;
      window.clearInterval(timerHandle);
      window.setTimeout(function () {
        finished = true;
        window.location.href = "./step3-result.html";
      }, 2000);
    }

    function updateProgress(elapsed) {
      var progress = Math.min(1, elapsed / maxSeconds);
      timerCurrent.textContent = formatSeconds(Math.floor(elapsed));
      progressValue.style.strokeDashoffset = String(circumference * (1 - progress));
      return progress;
    }

    function tick() {
      if (finished || loading) return;
      var elapsedMs = Date.now() - startedAt;
      var elapsed = Math.min(maxSeconds, elapsedMs / 1000);
      var progress = updateProgress(elapsed);

      if (progress >= 1) {
        updateProgress(maxSeconds);
        completeRecording(false);
      }
    }

    finishBtn.addEventListener("click", function () {
      completeRecording(true);
    });
    updateProgress(0);
    timerHandle = window.setInterval(tick, 100);
  </script>
</body>
</html>
