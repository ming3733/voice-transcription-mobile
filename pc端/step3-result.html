<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:,">
  <title>语音转文字 - 识别结果</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      overflow: hidden;
    }

    .viewport {
      width: 1280px;
      height: 720px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      transform-origin: center center;
      transform: scale(min(calc(100vw / 1280), calc(100vh / 720)));
    }

    .stage {
      position: relative;
      width: 1280px;
      height: 720px;
      background: #ffffff;
      overflow: hidden;
    }

    .bg,
    .phone-shell,
    .phone-panel {
      position: absolute;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .bg {
      inset: 0;
      width: 1280px;
      height: 720px;
      object-fit: cover;
    }

    .phone-shell {
      left: 473px;
      top: 64px;
      width: 335px;
      height: 592px;
      object-fit: cover;
    }

    .phone-panel {
      left: 508px;
      top: 90px;
      width: 264px;
      height: 536px;
    }

    .title {
      position: absolute;
      left: 604px;
      top: 119px;
      width: 72px;
      height: 24px;
      color: #1f2937;
      font-size: 18px;
      font-weight: 600;
      line-height: 24px;
      text-align: center;
      white-space: nowrap;
    }

    .result-box {
      position: absolute;
      left: 524px;
      top: 167px;
      width: 232px;
      height: 379px;
      border: 1px solid #bfdfff;
      border-radius: 16px;
      background: #ffffff;
      overflow: hidden;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .result-box:focus-within {
      border-color: #5cafff;
      box-shadow: 0 0 0 3px rgba(92, 175, 255, 0.18);
    }

    .result-input {
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      resize: none;
      padding: 16px;
      background: transparent;
      color: #141414;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: normal;
    }

    .action {
      position: absolute;
      top: 562px;
      width: 108px;
      height: 48px;
      border: 0;
      border-radius: 9999px;
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .rerecord {
      left: 524px;
      background: #ff9928;
      box-shadow: 0 4px 6px rgba(255, 153, 40, 0.3);
    }

    .confirm {
      left: 648px;
      background: #2694ff;
      box-shadow: 0 4px 6px rgba(38, 148, 255, 0.3);
    }

    .rerecord:hover {
      background: #f28b16;
      box-shadow: 0 8px 14px rgba(255, 153, 40, 0.35);
      transform: translateY(-1px);
    }

    .confirm:hover {
      background: #1688f7;
      box-shadow: 0 8px 14px rgba(38, 148, 255, 0.35);
      transform: translateY(-1px);
    }

    .action:active {
      transform: translateY(1px) scale(0.98);
    }

    .rerecord:active {
      background: #e77c0e;
      box-shadow: 0 2px 5px rgba(255, 153, 40, 0.28);
    }

    .confirm:active {
      background: #0f7ee8;
      box-shadow: 0 2px 5px rgba(38, 148, 255, 0.28);
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 50%;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      font-size: 16px;
      font-weight: 400;
      line-height: 22px;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: opacity 160ms ease;
      z-index: 20;
    }

    .toast.is-visible {
      opacity: 1;
    }

  </style>
</head>
<body>
  <main class="viewport" aria-label="语音转文字识别结果设计稿还原">
    <section class="stage">
      <img class="bg" src="./images/step2-bg.png" alt="">
      <img class="phone-shell" src="./images/step2-phone.png" alt="">
      <img class="phone-panel" src="./images/step2-panel.svg" alt="">

      <div class="title">识别结果</div>

      <div class="result-box">
        <textarea class="result-input" aria-label="识别结果">你好，欢迎学习编程，今天我们一起来写一个有趣的小程序吧！</textarea>
      </div>

      <button class="action rerecord" type="button" id="rerecordBtn">重新录音</button>
      <button class="action confirm" type="button" id="confirmBtn">确认</button>
      <div class="toast" id="failureToast" role="status" aria-live="polite" aria-hidden="true">识别失败了，请稍后重试～</div>
    </section>
  </main>
  <script>
    var resultToastFlag = "voiceResultToast";
    var failureToast = document.getElementById("failureToast");
    var toastTimer = null;

    function showFailureToast() {
      if (!failureToast) return;

      var resultInput = document.querySelector(".result-input");
      if (resultInput) {
        resultInput.value = "";
      }

      window.clearTimeout(toastTimer);
      failureToast.classList.add("is-visible");
      failureToast.setAttribute("aria-hidden", "false");

      toastTimer = window.setTimeout(function () {
        failureToast.classList.remove("is-visible");
        failureToast.setAttribute("aria-hidden", "true");
      }, 2000);
    }

    document.getElementById("rerecordBtn").addEventListener("click", function () {
      window.location.href = "./step2-recording.html";
    });

    document.getElementById("confirmBtn").addEventListener("click", function () {
      window.location.href = "./index.html";
    });

    try {
      if (sessionStorage.getItem(resultToastFlag) === "manual-finish") {
        sessionStorage.removeItem(resultToastFlag);
        window.setTimeout(showFailureToast, 120);
      }
    } catch (error) {
      // Ignore storage failures in restricted browser contexts.
    }
  </script>
</body>
</html>
