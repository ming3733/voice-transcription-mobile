<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:," />
    <title>语音转文字 - 移动端录音准备</title>
    <link rel="stylesheet" href="./styles.css?v=10" />
  </head>
  <body>
    <main class="viewport" aria-label="语音转文字移动端录音准备页">
      <section class="stage" data-node-id="44:8" data-name="移动端-录音准备">
        <img class="workspace-bg" src="./assets/bg.png" alt="" />
        <img class="center-card" src="./assets/card-bg.png" alt="" />

        <div class="phone-surface" aria-hidden="true"></div>
        <div class="mobile-shell" aria-hidden="true">
          <img src="./assets/phone-frame.png" alt="" />
        </div>

        <button class="primary-action" type="button" id="startButton">开始</button>

        <div class="voice-visual" aria-hidden="true">
          <div class="mic-shadow"></div>
          <div class="mic-orb">
            <img src="./assets/mic-icon.svg" alt="" />
          </div>
        </div>

        <div class="copy-block">
          <h1>准备录音</h1>
          <p>点击「开始」后说话，我会把语音转成文字</p>
        </div>
      </section>
    </main>

    <script src="./script.js?v=3"></script>
  </body>
</html>
